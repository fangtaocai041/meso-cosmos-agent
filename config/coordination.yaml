# ═══════════════════════════════════════════════════════════════
# Meso-Cosmos Agent — S-T-V-P 四体协调配置
# ═══════════════════════════════════════════════════════════════
# 角色:
#   S (State):      fish-ecology-assistant  — 知识供给
#   T (Transition): meso-cosmos-agent       — 核心执行层 (本项目的协调配置)
#   V (Validation): cognitive-search-engine — 验证引擎
#   P (Porpoise):   porpoise-agent          — 江豚专研
#
# 管线: UNDERSTAND → ROUTE → EXECUTE → VALIDATE → SYNTHESIZE → EVOLVE

version: "1.0.0"
root: "D:\\Reasonix"

# ══════════════════════════════════════════════════════════════
# S-T-V-P 项目注册表
# ══════════════════════════════════════════════════════════════
projects:
  fish-ecology-assistant:
    role: "S (State)"
    path: "../fish-ecology-assistant"
    entry_skill: "research-orchestrator"
    pipeline: "5-stage: Plan → Search → Analyze → Write → Review"
    activation_keywords:
      - fish, fishery, fishing, ecology, community, isotope
      - morphometric, diet, feeding, habitat, biodiversity
      - species diversity, ichthyology, 鱼类, 渔业, 生态, 食性
    exports:
      - stats-assistant
      - research-analyst
      - phd-proposal-writer
      - ima-smart-search

  porpoise-agent:
    role: "P (Porpoise)"
    path: "../porpoise-agent"
    entry_skill: "search-literature"
    pipeline: "5-phase: Literature → Analysis → Survey → Conservation → Report"
    activation_keywords:
      - porpoise, cetacean, dolphin, whale, acoustic, click
      - NBHF, PAM, echolocation, vocalization, bycatch
      - 江豚, 豚类, 声学
    exports:
      - detect-clicks
      - estimate-abundance
      - assess-threats
      - search-literature

  coilia-agent:
    role: "P₂ (Coilia Specialist)"
    path: "../coilia-agent"
    entry_skill: "search-literature"
    pipeline: "5-phase: Literature → Migration → Genetics → Stock → Report"
    species: "Coilia nasus (刀鲚/长江刀鱼)"
    research_group: "淡水渔业研究中心 刘凯研究员课题组"
    sister_agent: "porpoise-agent (P₁)"
    activation_keywords:
      - 刀鲚, 长颌鲚, 刀鱼, 长江刀鱼, Coilia nasus, tapertail anchovy
      - 洄游, 耳石微化学, Sr/Ca, 溯河, anadromous, otolith
      - 鲚属, 短颌鲚, 凤鲚, Coilia brachygnathus, Coilia mystus
    exports:
      - search-literature
      - analyze-migration
      - assess-stock
      - analyze-genetics

  cognitive-search-engine:
    role: "V (Validation)"
    path: "../cognitive-search-engine"
    entry_skill: "graph-search-engine"
    pipeline: "Hub-and-Spoke: Locate Hubs → Extract Spokes → Gap Detection"
    activation_keywords:
      - search, literature, paper, review, systematic
      - species, taxonomy, genus, species name, OCR variant
    exports:
      - graph-search-engine
      - cognitive-species-search
      - parallel-search
    always_validate: true
    engine_path: "../cognitive-search-engine/"
    loader: "importlib (DirectLoader)"

# ══════════════════════════════════════════════════════════════
# 智能路由规则 — 江豚→P₁, 特定鱼类→V, 生态问题→S
# ══════════════════════════════════════════════════════════════
routing:
  # 长江流域知识库
  yangtze_knowledge_base: "../fish-ecology-assistant/config/yangtze_fish_species.yaml"
  
  rules:
    # 规则0: 刀鲚/鲚属 → coilia-agent (P₂ 专研)
    - query_contains: ["刀鲚", "长颌鲚", "刀鱼", "长江刀鱼", "Coilia nasus",
                        "tapertail anchovy", "鲚属", "短颌鲚", "凤鲚",
                        "Coilia brachygnathus", "Coilia mystus"]
      route_to: "coilia-agent"
      skill: "search-literature"
      budget_share: 0.60
      reason: "刀鲚专研问题 → P₂ (刘凯课题组方向, 与P₁江豚平级)"

    # 规则1: 江豚/鲸类 → porpoise-agent (P₁ 专研)
    - query_contains: ["江豚", "porpoise", "Neophocaena", "finless porpoise",
                        "NBHF", "click", "echolocation", "cetacean",
                        "声学", "PAM", "被动声学"]
      route_to: "porpoise-agent"
      skill: "search-literature"
      budget_share: 0.60
      reason: "江豚专研问题 → P₁ (刘凯课题组方向)"

    # 规则2: 特定鱼类物种名 → cognitive-search-engine + fish-ecology
    - query_contains: ["鲟", "鳤", "鯮", "鳡", "鲥", "胭脂鱼", "白鲟",
                        "中华鲟", "长江鲟", "铜鱼", "鳜", "翘嘴鲌",
                        "Acipenser", "Ochetobius", "Luciobrama",
                        "Elopichthys", "Tenualosa", "Myxocyprinus"]
      route_to: ["cognitive-search-engine", "fish-ecology-assistant"]
      budget_split: {cognitive: 0.40, fish: 0.40, porpoise: 0.20}
      reason: "特定鱼类 → V深度搜索 + S生态分析"

    # 规则3: 长江生态/资源/禁捕 → fish-ecology-assistant
    - query_contains: ["长江", "禁捕", "资源量", "优势种", "水质", "消落区",
                        "渔业", "捕捞", "Yangtze", "fishery", "生态",
                        "栖息地", "多样性", "community", "diversity"]
      route_to: "fish-ecology-assistant"
      skill: "research-orchestrator"
      budget_share: 0.70
      reason: "长江生态问题 → S (12引擎 + 5阶段流水线)"

    # 规则4: 文献/综述 → cognitive-search-engine (always validate)
    - query_contains: ["文献", "综述", "review", "论文", "paper",
                        "progress", "研究进展", "系统发育"]
      route_to: "cognitive-search-engine"
      skill: "graph-search-engine"
      budget_share: 0.50
      reason: "文献搜索 → V (认知搜索 + 三角验证)"

    # 默认: 三项目协同
    - default: ["cognitive-search-engine", "fish-ecology-assistant"]
      budget_split: {cognitive: 0.30, fish: 0.50, porpoise: 0.20}

# ══════════════════════════════════════════════════════════════
# 6-Phase Pipeline Configuration
# ══════════════════════════════════════════════════════════════
pipeline:
  phases:
    understand:
      order: 0
      description: "Macro-BDI: parse question → classify domain → form intention"
    route:
      order: 1
      description: "Meso-Coordination: query routing rules → allocate resources"
      budget_split:
        primary: 0.60
        secondary: 0.30
        peripheral: 0.10
    execute:
      order: 2
      description: "Micro-Execution: delegate to project agents → monitor progress"
      timeout_sec: 300
      max_concurrent: 2
    validate:
      order: 3
      description: "Cross-Verification: authority scoring → triangulation → contradiction detection"
      min_sources_core_claim: 3
      min_independent_projects: 2
    synthesize:
      order: 4
      description: "Merge: combine multi-project results → unified report"
    evolve:
      order: 5
      description: "Feedback: evaluate metrics → trigger adaptations → persist config"

# ══════════════════════════════════════════════════════════════
# Evolution Triggers (unified)
# ══════════════════════════════════════════════════════════════
evolution:
  enabled: true
  triggers:
    T1_pipeline_failure:
      condition: "pipeline_success_rate < 0.60 for 3 consecutive sessions"
      action: "increase max_retry by 1"
    T2_contradiction:
      condition: "contradiction_rate > 0.30 for 3 consecutive sessions"
      action: "increase contradiction_budget_multiplier by 0.5"
    T3_emergence_noise:
      condition: "new_paper_emergence_rate > 0.20 for 3 consecutive sessions"
      action: "increase emergence_threshold by 1"
    T4_recall_drop:
      condition: "recall_rate < 0.85 for 3 consecutive sessions"
      action: "increase verification_min_sources by 1"
    T5_token_exceed:
      condition: "avg_tokens_per_query > 2500 for 3 consecutive sessions"
      action: "decrease max_revision_rounds by 1"
    T6_dead_end:
      condition: "consecutive_routing_failures >= 3"
      action: "decrease dead_end_retreat_threshold by 1"
    T7_health_check_failure:
      condition: "health_check_failure_count >= 2"
      action: "log CRITICAL + suggest restart"
