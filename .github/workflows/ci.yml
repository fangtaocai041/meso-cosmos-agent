name: S-T-V-P₁-P₂ CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  low-pressure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install pyyaml pytest
      - run: python ../scripts/run_all_tests.py --level low

  medium-pressure:
    needs: low-pressure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install pyyaml pytest
      - run: python ../scripts/run_all_tests.py --level medium

  high-pressure:
    needs: medium-pressure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install pyyaml pytest
      - run: python ../scripts/run_all_tests.py --level high

  philosophy-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: python ../scripts/verify_philosophy_rules.py
